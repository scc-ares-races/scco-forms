<!DOCTYPE html>
<link rel=stylesheet href={{assets}}/SCCoPIFO.css>
<script type=text/javascript src={{assets}}/pack-it-forms.js></script>
<title>CPOD Commodities Update Form</title>
<packet-form>
  <form-roo form-title="CPOD Commodities Update Form" paper-version="PDF: 20260307">
    <form-dthtf to-ics-positions="CPOD Unit; Mass Care &amp; Emerg. Asst. Branch; Operations"></form-dthtf>
    <div class=section>Overview</div>
    <div class=layout-grid style="--columns: max-content 1fr max-content 1fr">
      <div class="pair colspan4">
        <label for=20.>21. Jurisdiction:</label>
        <jurisdiction-box name=20. class=colspan3 style="{{w-20.}}"></jurisdiction-box>
      </div>
      <div class=pair>
        <label for=21d.>22. Prepared Date:</label>
        <input id=21d. name=21d. class=date required style="{{w-21d.}}">
      </div>
      <div class=pair>
        <label for=21t.>23. Prepared Time:</label>
        <input id=21t. name=21t. class=time required style="{{w-21t.}}">
      </div>
    </div>
    <div class=section>General Site Information</div>
    <div class=layout-pair>
      <div class=pair>
        <label for=30.>31. Site Name:</label>
        <input id=30. name=30. required style="{{w-30.}}">
      </div>
      <div class=pair>
        <div class=label>32. Status Update:</div>
        <div class="layout-grid colgap" style="--columns: repeat(3, max-content)">
          <label style="order:1"><input id=31. name=31. type=radio value=Activated>a. Activated</label>
          <label style="order:4"><input id=31. name=31. type=radio value="Pending Activation">b. Pending
            Activation</label>
          <label style="order:2"><input id=31. name=31. type=radio value="Pending Demobilization">c. Pending
            Demobilization</label>
          <label style="order:5"><input id=31. name=31. type=radio value=Demobilization>d. Demobilization</label>
          <label style="order:3"><input id=31. name=31. type=radio value="Not Activated">e. Not Activated</label>
        </div>
      </div>
    </div>
    <div class=section>Commodities</div>
    <div class=layout-pair>
      <def:commodity>
        <div class="subsec rowspan2" {{hidden-until}}>Item {{n}}</div>
        <div class=layout-pair {{hidden-until}}>
          <div class=pair>
            <label for={{tag}}a.>{{fnum}}a. Type of Commodity:</label>
            <input id={{tag}}a. name={{tag}}a. {{required}} style="{{w-70a.}}">
          </div>
        </div>
        <div class=layout-grid style="--columns: max-content 1fr max-content 1fr max-content 1fr" {{hidden-until}}>
          <div class=pair>
            <label for={{tag}}b.>{{fnum}}b. Starting Quantity:</label>
            <input id={{tag}}b. name={{tag}}b. class=cardinal-number required-if={{tag}}a. else-disallowed
              style="width:4.13rem">
          </div>
          <div class=pair>
            <label for={{tag}}c.>{{fnum}}c. Qty Distributed:</label>
            <input id={{tag}}c. name={{tag}}c. class=cardinal-number required-if={{tag}}a. else-disallowed
              style="width:4.91rem">
          </div>
          <div class=pair>
            <label for={{tag}}d.>{{fnum}}d. Qty Available:</label>
            <input id={{tag}}d. name={{tag}}d. class=cardinal-number required-if={{tag}}a. else-disallowed
              style="width:4.73rem">
          </div>
        </div>
      </def:commodity>
      <commodity n=1 fnum=81 tag=70 required></commodity>
      <commodity n=2 fnum=82 tag=71 hidden-until=70a.></commodity>
      <commodity n=3 fnum=83 tag=72 hidden-until=71a.></commodity>
      <commodity n=4 fnum=84 tag=73 hidden-until=72a.></commodity>
      <commodity n=5 fnum=85 tag=74 hidden-until=73a.></commodity>
      <commodity n=6 fnum=86 tag=75 hidden-until=74a.></commodity>
      <commodity n=7 fnum=87 tag=76 hidden-until=75a.></commodity>
      <commodity n=8 fnum=88 tag=77 hidden-until=76a.></commodity>
    </div>
  </form-roo>
</packet-form>
