<!DOCTYPE html>
<link rel=stylesheet href={{assets}}/SCCoPIFO.css>
<script type=text/javascript src={{assets}}/pack-it-forms.js></script>
<title>Resource Request</title>
<packet-form>
  <form-roo form-title="Resource Request" paper-version="PDF: 20260307">
    <form-dthtf to-ics-positions="Resource Status &amp; Tracking Unit; Supply Branch; Logistics"></form-dthtf>
    <div class=section>Resource Order</div>
    <div class=layout-grid style="--columns: max-content 1fr max-content 1fr">
      <div class="pair colspan4">
        <label for=20.>21. Title:</label>
        <input id=20. name=20. required class=colspan3 style="{{w-20.}}">
      </div>
      <div class="pair colspan4">
        <label for=21.>22. Jurisdiction:</label>
        <jurisdiction-box id=21. name=21. class=colspan3 style="{{w-21.}}"></jurisdiction-box>
      </div>
      <div class=pair>
        <label for=22d.>23. Date:</label>
        <input id=22t. name=22d. class=date required style="{{w-22t.}}">
      </div>
      <div class=pair>
        <label for=22t.>24. Time:</label>
        <input id=22t. name=22t. class=time required style="{{w-22t.}}">
      </div>
    </div>
    <div class=layout-pair>
      <def:item>
        <div style="display:contents" {{hidden-until}}>
          <div class=subsec>Item {{n}}</div>
          <div class=layout-vertical>
            <div class=layout-grid style="--columns: max-content 1fr max-content max-content">
              <div class=pair>
                <label for={{id}}n.>3{{n}}a. Item Name:</label>
                <input name={{id}}n. {{required}} style="{{w-23n.}}">
              </div>
              <div class=pair>
                <label for={{id}}q.>3{{n}}b. Quantity Requested:</label>
                <input name={{id}}q. class=cardinal-number required-if={{id}}n. else-disallowed style="{{w-23q.}}">
              </div>
            </div>
            <div class=layout-pair>
              <div class=pair>
                <label for={{id}}d.>3{{n}}c. Description:</label>
                <textarea name={{id}}d. style="{{w-23d.}}" allowed-if={{id}}n.></textarea>
              </div>
            </div>
            <div class=layout-pair>
              <div class=pair>
                <div class=label>3{{n}}d. Includes Items for Demobilization?</div>
                <div class="layout-horizontal colgap required-group" required-if={{id}}n.>
                  <label><input type=radio name={{id}}i. value=Yes>Yes</label>
                  <label><input type=radio name={{id}}i. value=No>No</label>
                </div>
              </div>
            </div>
          </div>
        </div>
      </def:item>
      <item n=1 id=23 required></item>
      <item n=2 id=24 hidden-until=23n.></item>
      <item n=3 id=25 hidden-until=24n.></item>
      <item n=4 id=26 hidden-until=25n.></item>
      <item n=5 id=27 hidden-until=26n.></item>
      <item n=6 id=28 hidden-until=27n.></item>
    </div>
    <div class=section>Priority</div>
    <div class="layout-pair colgap">
      <div class=pair>
        <div class=label>41. Priority:<br><span class=annotation>(Pick One)</span></div>
        <div class="layout-pair colgap required-group">
          <label style="order:1"><input name=30. type=radio value=Urgent>a. Urgent (as soon as possible)</label>
          <label style="order:3"><input name=30. type=radio value=High>b. High (within 24 hours)</label>
          <label style="order:2"><input name=30. type=radio value=Medium>c. Medium (1–2 days)</label>
          <label style="order:4"><input name=30. type=radio value=Low>d. Low (2–3 days)</label>
        </div>
      </div>
    </div>
    <div class=section>Requested By Details</div>
    <div class=layout-grid style="--columns: max-content 1fr max-content 1fr">
      <div class=pair>
        <label for=40.>51. Requested By Name:</label>
        <input id=40. name=40. required style="{{w-40.}}">
      </div>
      <div class="border colspan2">
        <label style="margin-left:0"><input type=checkbox name=40s. value=checked>52. with signature</label>
      </div>
      <div class=pair>
        <label for=41.>53. Requested By Phone:</label>
        <input id=41. name=41. class=phone-number required style="{{w-41.}}">
      </div>
      <div class=pair>
        <label for=42.>54. Requested By Email:</label>
        <input id=42. name=42. required style="{{w-42.}}">
      </div>
      <div class="pair colspan4">
        <label for=43.>55. Requested By Position:</label>
        <input id=43. name=43. class=colspan3 required style="{{w-43.}}">
      </div>
    </div>
    <div class=section>Incident Details</div>
    <div class=layout-pair>
      <div class=pair>
        <label for=51.>61. Name of the Jurisdiction's incident:</label>
        <input id=51. name=51. style="{{w-51.}}">
      </div>
      <div class=pair>
        <label for=53.>62. Name of the County's incident:</label>
        <input id=53. name=53. style="{{w-53.}}">
      </div>
    </div>
    <div class=section>Comments</div>
    <div class=border>
      <textarea name=60. style="{{w-60.}}"></textarea>
    </div>
  </form-roo>
</packet-form>
