<!DOCTYPE html>
<link rel=stylesheet href={{assets}}/SCCoPIFO.css>
<script type=text/javascript src={{assets}}/pack-it-forms.js></script>
<title>Shelter Form</title>
<packet-form>
  <form-roo form-title="Shelter Form" paper-version="PDF: 20260307">
    <form-dthtf to-ics-positions="Care &amp; Shelter Unit; Mass Care &amp; Emerg. Asst. Branch; Operations"></form-dthtf>
    <div class=section>General Site Information</div>
    <div class=layout-pair>
      <div class=pair>
        <label for=20.>21. Jurisdiction:</label>
        <jurisdiction-box id=20. name=20. style="{{w-20.}}"></jurisdiction-box>
      </div>
      <div class=pair>
        <label for=21.>22. Shelter Name:</label>
        <input id=21. name=21. required style="{{w-21.}}">
      </div>
      <div class=pair>
        <label for=22.>23. Location:</label>
        <input id=22. name=22. required style="{{w-22.}}">
      </div>
      <div class=pair>
        <div class=label>24. Type:<br><span class=annotation>(multi-select)</span></div>
        <div class="layout-grid colgap required-group" style="--columns: max-content max-content 1fr">
          <label style="order:1"><input type=checkbox value=checked name=23a.>a. Congregate</label>
          <label style="order:4"><input type=checkbox value=checked name=23b.>b. Non-Congregate</label>
          <label style="order:2"><input type=checkbox value=checked name=23c.>c. Temporary Evacuation Point</label>
          <label style="order:5"><input type=checkbox value=checked name=23d.>d. Pets Accepted</label>
          <label style="order:3"><input type=checkbox value=checked name=23e.>e. Large Animals</label>
        </div>
      </div>
      <div class=pair>
        <div class=label>25. Shelter Status:</div>
        <div class="layout-grid colgap required-group" style="--columns: max-content 1fr">
          <label style="order:1"><input type=radio name=24. value=Setup>a. Setup in progress, not accepting guests</label>
          <label style="order:3"><input type=radio name=24. value=Open>b. Open, accepting guests</label>
          <label style="order:2"><input type=radio name=24. value=Full>c. Full, not accepting guests</label>
          <label style="order:4"><input type=radio name=24. value=Closed>d. Closed</label>
        </div>
      </div>
      <div class=pair>
        <div class=label>26. Resources:<br><span class=annotation>(multi-select)</span></div>
        <div class="layout-grid colgap" style="--columns: max-content 1fr">
          <label style="order:1"><input type=checkbox value=checked name=25a.>a. Warming Center</label>
          <label style="order:3"><input type=checkbox value=checked name=25b.>b. Cooling Center</label>
          <label style="order:2"><input type=checkbox value=checked name=25c.>c. Food &amp; Drink</label>
          <label style="order:4"><input type=checkbox value=checked name=25d.>d. Charging Stations</label>
        </div>
      </div>
    </div>
    <div class=layout-pair>
      <div class=pair>
        <label for=26.>27. Notes:</label>
        <textarea id=26. name=26. style="{{w-26.}}"></textarea>
      </div>
    </div>
    <div class=layout-grid style="--columns: max-content 1fr max-content 1fr">
      <div class=pair>
        <div class=label>28. ADA Compliant:</div>
        <div class="layout-horizontal colgap">
          <label><input type=radio name=27. value=Yes>Yes</label>
          <label><input type=radio name=27. value=No>No</label>
        </div>
      </div>
      <div class=pair>
        <div class=label>29. Pets Allowed?</div>
        <div class="layout-horizontal colgap">
          <label><input type=radio name=28. value=Yes>Yes</label>
          <label><input type=radio name=28. value=No>No</label>
        </div>
      </div>
    </div>
    <div class=layout-grid style="--columns: max-content 1fr max-content 1fr max-content 1fr">
      <div class=pair>
        <label for=29.>30. Maximum Capacity:</label>
        <input id=29. name=29. class=cardinal-number required style="{{w-29.}}">
      </div>
      <div class=pair>
        <label for=30.>31. Total Registered:</label>
        <input id=30. name=30. class=cardinal-number required style="{{w-30.}}">
      </div>
      <div class=pair>
        <label for=31.>32. Cot Numbers:</label>
        <input id=31. name=31. class=cardinal-number required style="{{w-31.}}">
      </div>
    </div>
    <div class=layout-pair>
      <div class=pair>
        <label for=32.>33. AFN Considerations:</label>
        <textarea id=32. name=32. style="{{w-32.}}"></textarea>
      </div>
    </div>
    <div class=section>Contact Information</div>
    <div class=layout-pair>
      <div class=pair>
        <div class=label>41. Managed By:</div>
        <div class="layout-grid colgap required-group" style="--columns: max-content max-content 1fr">
          <label style="order:1"><input type=radio name=40. value=ARC>a. American Red Cross</label>
          <label style="order:4"><input type=radio name=40. value=Private>b. Private</label>
          <label style="order:2"><input type=radio name=40. value=Government>c. Government</label>
          <label style="order:5"><input type=radio name=40. value=Community>d. Community</label>
          <label style="order:3"><input type=radio name=40. value=Other>e. Other</label>
        </div>
      </div>
    </div>
    <div class=layout-grid style="--columns: max-content 1fr max-content 1fr">
      <div class=pair>
        <label for=41.>42. Primary Contact Name:</label>
        <input id=41. name=41. required style="{{w-41.}}">
      </div>
      <div class=pair>
        <label for=42.>43. Primary Contact Phone Number:</label>
        <input id=42. name=42. class=phone-number required style="{{w-42.}}">
      </div>
      <div class="pair colspan4">
        <label for=43.>44. Primary Contact Email:</label>
        <input id=43. name=43. class=colspan3 style="{{w-43.}}">
      </div>
    </div>
  </form-roo>
</packet-form>
