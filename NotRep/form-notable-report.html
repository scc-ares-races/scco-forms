<!DOCTYPE html>
<link rel=stylesheet href={{assets}}/SCCoPIFO.css>
<script type=text/javascript src={{assets}}/pack-it-forms.js></script>
<title>Notable Report</title>
<packet-form>
  <form-roo form-title="Notable Report" paper-version="PDF: 20260307">
    <form-dthtf to-ics-positions="Situational Analysis Unit; Common Operating Picture Spec.; Planning"></form-dthtf>
    <div class=layout-grid style="--columns: max-content 1fr max-content 1fr">
      <div class=pair>
        <label for=20.>21. Jurisdiction:</label>
        <jurisdiction-box id=20. name=20. style="{{w-20.}}"></jurisdiction-box>
      </div>
      <div class=pair>
        <label for=21.>22. Originator:</label>
        <input id=21. name=21. required style="{{w-21.}}">
      </div>
    </div>
    <div class=layout-pair>
      <div class=pair>
        <div class=label>23. Severity: <span class=annotation>(Pick One)</span></div>
        <div class="layout-horizontal colgap required-group">
          <label><input name=22. type=radio value=High required>High</label>
          <label><input name=22. type=radio value=Medium required>Medium</label>
          <label><input name=22. type=radio value=Low required>Low</label>
        </div>
      </div>
      <div class=pair>
        <div class=label>24. Escalate to County Op Area?</div>
        <div class="layout-horizontal colgap required-group">
          <label><input name=23. type=radio value=Yes required>Yes</label>
          <label><input name=23. type=radio value=No required>No</label>
        </div>
      </div>
      <div class=pair hidden-until="23.=Yes">
        <label for=25.>25. Name of the County Incident:</label>
        <input id=25. name=25. allowed-if="23.=Yes" else-disallowed style="{{w-25.}}">
      </div>
    </div>
    <div class=section>Event Details</div>
    <div class=layout-grid style="--columns: max-content 1fr max-content 1fr">
      <div class="pair colspan4">
        <label for=30.>31. Title:</label>
        <input id=30. name=30. required class=colspan3 style="{{w-30.}}">
      </div>
      <div class=pair>
        <label for=31d.>32. Date:</label>
        <input id=31d. name=31d. class=date required style="{{w-31d.}}">
      </div>
      <div class=pair>
        <label for=31t.>33. Time:</label>
        <input id=31t. name=31t. class=time required style="{{w-31t.}}">
      </div>
    </div>
    <div class="border layout-vertical">
      <div class=label>34. Event Type:</div>
      <div class="required-group layout-grid colgap" style="--columns: max-content max-content 1fr; margin-left: 2rem">
        <label style="order:1"><input name=32. type=radio value=1 required>1: Transportation</label>
        <label style="order:4"><input name=32. type=radio value=2 required>2: Communications</label>
        <label style="order:7"><input name=32. type=radio value=3 required>3: Construction and Engineering</label>
        <label style="order:10"><input name=32. type=radio value=4 required>4: Fire and Rescue</label>
        <label style="order:13"><input name=32. type=radio value=5 required>5: Management</label>
        <label style="order:16"><input name=32. type=radio value=6 required>6: Care and Shelter</label>
        <label style="order:19"><input name=32. type=radio value=7 required>7: Resources</label>
        <label style="order:2"><input name=32. type=radio value=8 required>8: Public Health and Medical</label>
        <label style="order:5"><input name=32. type=radio value=9 required>9: Search and Rescue</label>
        <label style="order:8"><input name=32. type=radio value=10 required>10: Hazardous Materials Response</label>
        <label style="order:11"><input name=32. type=radio value=11 required>11: Food and Agriculture</label>
        <label style="order:14"><input name=32. type=radio value=12 required>12: Utilities</label>
        <label style="order:17"><input name=32. type=radio value=13 required>13: Law Enforcement</label>
        <label style="order:20"><input name=32. type=radio value=14 required>14: Recovery</label>
        <label style="order:3"><input name=32. type=radio value=15 required>15: Public Information</label>
        <label style="order:6"><input name=32. type=radio value=16 required>16: Animal Services</label>
        <label style="order:9"><input name=32. type=radio value=17 required>17: Volunteer Management</label>
        <label style="order:12"><input name=32. type=radio value=18 required>18: Cybersecurity</label>
        <label style="order:15"><input name=32. type=radio value=19 required>19: Donations Management</label>
        <label class=rowspan2 style="order:18"><input name=32. type=radio value=20 required>20: Continuity of
          Operations/Government</label>
      </div>
    </div>
    <div class=layout-pair>
      <div class=pair>
        <label for=33.>35. Details:</label>
        <textarea id=33. name=33. required style="{{w-33.}}"></textarea>
      </div>
    </div>
    <div class=section>Contact Information</div>
    <div class=layout-grid style="--columns: max-content 1fr max-content 1fr">
      <div class=pair>
        <label for=40.>41. Point of Contact Name:</label>
        <input id=40. name=40. style="{{w-40.}}">
      </div>
      <div class=pair>
        <label for=41.>42. Contact Phone Number:</label>
        <input id=41. name=41. class=phone-number style="{{w-41.}}">
      </div>
      <div class="pair colspan4">
        <label for=42.>43. Contact Email:</label>
        <input id=42. name=42. class=colspan3 style="{{w-42.}}">
      </div>
    </div>
    <div class=section>Event Expiration</div>
    <div class=layout-grid style="--columns: repeat(3, max-content) 1fr">
      <div class=pair>
        <div class=label>51. Do you want this event to expire?</div>
        <div class="layout-horizontal colgap required-group">
          <label><input name=50. type=radio value=Yes required>Yes</label>
          <label><input name=50. type=radio value=No required>No</label>
        </div>
      </div>
      <div class=pair hidden-until="50.=Yes">
        <label for=51.>52. Date to Expire:</label>
        <input id=51. name=51. class=date required-if="50.=Yes" else-disallowed style="{{w-51.}}">
      </div>
    </div>
  </form-roo>
</packet-form>
