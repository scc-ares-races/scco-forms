<!DOCTYPE html>
<link rel=stylesheet href={{assets}}/SCCoPIFO.css>
<script type=text/javascript src={{assets}}/pack-it-forms.js></script>
<title>Damage Assessment</title>
<packet-form>
  <form-roo form-title="Damage Assessment" paper-version="PDF: 20260307">
    <form-dthtf to-ics-positions="Damage/Safety Assessment Group; Construction &amp; Eng. Branch; Operations"></form-dthtf>
    <div class=section>Overview</div>
    <div class=layout-grid style="--columns: max-content 1fr max-content 1fr">
      <div class=pair>
        <label for=20.>21. Jurisdiction:</label>
        <jurisdiction-box name=20. style="width:15.48rem"></jurisdiction-box>
      </div>
      <div class=pair>
        <label for=21.>22. Incident Name:</label>
        <input id=21. name=21. required style="{{w-21.}}">
      </div>
      <div class=pair>
        <label for=22.>23. Address:</label>
        <input id=22. name=22. required style="{{w-22.}}">
      </div>
      <div class=pair>
        <label for=23.>24. Unit/Suite:</label>
        <input id=23. name=23. style="{{w-23.}}">
      </div>
      <div class="pair colspan4">
        <div class=label>25. Type of Structure:</div>
        <div class="layout-grid colgap required-group colspan3" style="--columns: repeat(3, max-content)">
          <label style="order:1"><input name=24. type=radio value="Single Family" required>a. Single Family</label>
          <label style="order:4"><input name=24. type=radio value=Multi-Family required>b. Multi-Family</label>
          <label style="order:2"><input name=24. type=radio value="Mobile Home" required>c. Mobile Home</label>
          <label style="order:5"><input name=24. type=radio value=Business required>d. Business</label>
          <label style="order:3"><input name=24. type=radio value="Non-Profit Orgs" required>e. Non-Profit Orgs</label>
          <label style="order:6"><input name=24. type=radio value=Outbuilding required>f. Outbuilding</label>
        </div>
      </div>
      <div class="pair colspan4">
        <label for=25.>26. Number of Stories:</label>
        <input id=25. name=25. class="cardinal-number colspan3" style="{{w-25.}}">
      </div>
      <div class="pair colspan4">
        <div class=label>27. Own/Rent:</div>
        <div class="layout-horizontal colgap colspan3">
          <label><input name=26. type=radio value=Own>Own</label>
          <label><input name=26. type=radio value=Rent>Rent</label>
        </div>
      </div>
      <div class="pair colspan4">
        <div class=label>28. Types of Damage:</div>
        <div class="layout-pair colgap required-group colspan3">
          <label style="order:1"><input name=27a. type=checkbox value=checked required>a. Flooding</label>
          <label style="order:3"><input name=27b. type=checkbox value=checked required>b. Roof / Windows / Other Exterior</label>
          <label style="order:2"><input name=27c. type=checkbox value=checked required>c. Structural</label>
          <label style="order:4"><input name=27d. type=checkbox value=checked required>d. Other <span class=annotation>(define in comments)</span></label>
        </div>
      </div>
      <div class="pair colspan4">
        <div class=label>29. Basement Type:</div>
        <div class="layout-pair colgap required-group colspan3">
          <label style="order:1"><input name=28. type=radio value=Basement>a. Basement</label>
          <label style="order:3"><input name=28. type=radio value=Crawlspace>b. Crawlspace</label>
          <label style="order:2"><input name=28. type=radio value="Basement and Crawlspace">c. Basement and Crawlspace</label>
          <label style="order:4"><input name=28. type=radio value=N/A>d. N/A</label>
        </div>
      </div>
      <div class="border subgrid rowspan3 colspan4">
        <div class="label colspan4">30. What is the damage classification for this property?</div>
        <div></div>
        <div class="layout-grid colgap required-group rowspan2 colspan3" style="--columns: max-content max-content 1fr; margin-inline: 0.25rem">
          <label style="order:1"><input name=29. type=radio value=Destroyed>a. Destroyed</label>
          <label style="order:4"><input name=29. type=radio value=Major>b. Major</label>
          <label style="order:2"><input name=29. type=radio value=Minor>c. Minor</label>
          <label class=colspan2 style="order:5"><input name=29. type=radio value=Affected>d. Affected (Superficial or
            Cosmetic Damage Only)</label>
          <label style="order:3"><input name=29. type=radio value="No Visible Damage">e. No Visible Damage</label>
        </div>
      </div>
      <div class="pair colspan4">
        <div class=label>31. Tag:</div>
        <div class="layout-horizontal colgap colspan3">
          <label><input name=30. type=radio value=Green>a. Green Tagged</label>
          <label><input name=30. type=radio value=Yellow>b. Yellow Tagged</label>
          <label><input name=30. type=radio value=Red>c. Red Tagged</label>
        </div>
      </div>
      <div class=pair>
        <div class=label>32. Insurance:</div>
        <div class="layout-horizontal colgap">
          <label><input name=31. type=radio value=Yes>Yes</label>
          <label><input name=31. type=radio value=No>No</label>
        </div>
      </div>
      <div class=pair>
        <label for=32.>33. Estimated Damage ($):</label>
        <input id=32. name=32. class=cardinal-number style="{{w-32.}}">
      </div>
      <div class="pair colspan4">
        <label for=33.>34. Comments:</label>
        <textarea id=33. name=33. class=colspan3 style="{{w-33.}}"></textarea>
      </div>
      <div class=pair>
        <label for=34.>35. Contact Name:</label>
        <input id=34. name=34. required style="{{w-34.}}">
      </div>
      <div class=pair>
        <label for=35.>36. Contact Phone:</label>
        <input id=35. name=35. class=phone-number required style="{{w-35.}}">
      </div>
    </div>
  </form-roo>
</packet-form>
