<!DOCTYPE html>
<link rel=stylesheet href={{assets}}/SCCoPIFO.css>
<script type=text/javascript src={{assets}}/pack-it-forms.js></script>
<title>Road Closure</title>
<packet-form>
  <form-roo form-title="Road Closure" paper-version="PDF: 20260307">
    <form-dthtf to-ics-positions="Public Works Group; Construction &amp; Eng. Branch; Operations"></form-dthtf>
    <div class=section>Initial Information</div>
    <div class="layout-pair">
      <div class=pair>
        <label for=20.>21. Jurisdiction:</label>
        <jurisdiction-box id=20. name=20. style="{{w-20.}}"></jurisdiction-box>
      </div>
      <div class=pair>
        <label for=21.>22. Road/Intersection:</label>
        <input id=21. name=21. required style="{{w-21.}}">
      </div>
    </div>
    <div class="layout-pair">
      <div class=pair>
        <label for=22.>23. Location:</label>
        <textarea id=22. name=22. required style="{{w-22.}}"></textarea>
      </div>
      <div class=pair>
        <label for=23.>24. Details:</label>
        <textarea id=23. name=23. required style="{{w-23.}}"></textarea>
      </div>
      <div class=pair>
        <div class=label>25. Status:</div>
        <div class="layout-horizontal colgap required-group">
          <label><input type=radio name=24. value="Planned Closure">a. Planned Closure</label>
          <label><input type=radio name=24. value=Closed>b. Closed</label>
          <label><input type=radio name=24. value=Reopened>c. Reopened</label>
        </div>
      </div>
    </div>
    <div class=section>Closure Time</div>
    <div class="layout-grid" style="--columns: max-content 1fr max-content 1fr">
      <div class=pair>
        <label for=30d.>31. Closure Start Date:</label>
        <input id=30d. name=30d. class=date style="{{w-30d.}}">
      </div>
      <div class=pair>
        <label for=30t.>32. Closure Start Time:</label>
        <input id=30t. name=30t. class=time required-if=30d. else-disallowed style="{{w-30t.}}">
      </div>
      <div class=pair>
        <label for=31d.>33. Closure End Date:</label>
        <input id=31d. name=31d. class=date style="{{w-31d.}}">
      </div>
      <div class=pair>
        <label for=31t.>34. Closure End Time:</label>
        <input id=31t. name=31t. class=time required-if=31d. else-disallowed style="{{w-31t.}}">
      </div>
    </div>
  </form-roo>
</packet-form>
