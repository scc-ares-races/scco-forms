<!DOCTYPE html>
<link rel=stylesheet href={{assets}}/SCCoPIFO.css>
<script type=text/javascript src={{assets}}/pack-it-forms.js></script>
<title>Windshield Survey</title>
<packet-form>
  <form-roo form-title="Windshield Survey" paper-version="PDF: 20260307">
    <form-dthtf to-ics-positions="Damage/Safety Assessment Group; Construction &amp; Eng. Branch; Operations"></form-dthtf>
    <div class=section>Overview</div>
    <div class=layout-pair>
      <div class=pair>
        <label for=20.>21. Jurisdiction:</label>
        <jurisdiction-box id=20. name=20. style="{{w-20.}}"></jurisdiction-box>
      </div>
      <div class=pair>
        <label for=21.>22. Team:</label>
        <input id=21. name=21. required style="{{w-21.}}">
      </div>
      <div class=pair>
        <label for=22.>23. Location:</label>
        <input id=22. name=22. required style="{{w-22.}}">
      </div>
      <div class=pair>
        <div class=label>24. Item:</div>
        <div class="layout-horizontal colgap required-group">
          <label><input type=checkbox value=checked name=23a.>Building</label>
          <label><input type=checkbox value=checked name=23b.>Road</label>
        </div>
      </div>
      <div class=pair hidden-until=23a.>
        <div class=label>25. Building Type:</div>
        <div class="layout-pair required-group" required-if=23a. else-disallowed>
          <label style="order:1"><input type=radio name=24. value=Single>a. Single Family Home</label>
          <label style="order:3"><input type=radio name=24. value=Townhouse>b. Townhouse or Condo</label>
          <label style="order:5"><input type=radio name=24. value=Apartment>c. Apartment</label>
          <label style="order:2"><input type=radio name=24. value=Mobile>d. Mobile Home or Trailer</label>
          <label style="order:4"><input type=radio name=24. value=Business>e. Business</label>
          <label style="order:6"><input type=radio name=24. value=Other>f. Other <span class=annotation>(describe below)</span></label>
        </div>
      </div>
      <div class=pair>
        <div class=label>26. Damage Categorization:</div>
        <div class="layout-pair required-group">
          <label style="order:1"><input type=radio name=26. value=Affected>Affected</label>
          <label style="order:3"><input type=radio name=26. value=Minor>Minor</label>
          <label style="order:2"><input type=radio name=26. value=Major>Major</label>
          <label style="order:4"><input type=radio name=26. value=Destroyed>Destroyed</label>
        </div>
      </div>
      <div class=pair>
        <label for=27.>27. Safety Hazards /<br>Other Damage Observed:</label>
        <textarea id=27. name=27. style="{{w-27.}}"></textarea>
      </div>
    </div>
  </form-roo>
</packet-form>
