<!DOCTYPE html>
<link rel="stylesheet" type="text/css" href="{{assets}}/pack-it-forms.css" />
<style>
  table.section td:nth-child(1) {
    width: 1px;
    white-space: nowrap;
  }
</style>
<script type="text/javascript" src="{{assets}}/pack-it-forms.js"></script>
<title>HAvBed Report</title>
<the-form>
  <scco-header form-title="SCCo Medical Health Branch -- HAvBed Report" paper-version="EMResource: c190320"
    to-ics-positions="EMS Unit; Medical Health Branch; Operations Section"
    to-locations="PHDOC; County EOC"></scco-header>
  <table class="section">
    <tr class="block-caption">
      <td colspan="2">Hospital</td>
    </tr>
    <tr>
      <td>Hospital Name:</td>
      <td><select-hospital></select-hospital></td>
    </tr>
    <tr>
      <td>Command Center Status:</td>
      <td>
        <select name="22." required tabindex="22">
          <option value="" selected disabled hidden style="display:none;"></option>
          <option value="Available" data-background-color="green">Available</option>
          <option value="Drill or Exercise" data-background-color="purple">Drill or Exercise</option>
          <option value="Full Activation" data-background-color="red">Full Activation</option>
          <option value="Monitoring" data-background-color="orange">Monitoring</option>
          <option value="Not Activated" data-background-color="green">Not Activated</option>
          <option value="Unavailable" data-background-color="red">Unavailable</option>
          <option value="Limited Activation" data-background-color="red">Limited Activation</option>
        </select>
      </td>
    </tr>
    <tr class="block-caption">
      <td>Bed Availability</td>
      <td>Quantity / Status</td>
    </tr>
    <tr title="Beds that can support critically ill/injured patients, including ventilator support.">
      <td>Adult ICU:</td>
      <td><input name="41." type="text" class="cardinal-number" required tabindex="41" /></td>
    </tr>
    <tr
      title="Burn ICU beds either approved by the American Burn Association or self-designated. These beds are NOT to be included in other ICU bed counts.">
      <td>Burn:</td>
      <td><input name="42." type="text" class="cardinal-number" required tabindex="42" /></td>
    </tr>
    <tr>
      <td>Medical/Surgical:</td>
      <td><input name="43." type="text" class="cardinal-number" required tabindex="43" /></td>
    </tr>
    <tr>
      <td>Neg Flow Isolation:</td>
      <td><input name="44." type="text" class="cardinal-number" required tabindex="44" /></td>
    </tr>
    <tr>
      <td>Operating Room:</td>
      <td><input name="45." type="text" class="cardinal-number" required tabindex="45" /></td>
    </tr>
    <tr>
      <td>Pediatric ICU:</td>
      <td><input name="46." type="text" class="cardinal-number" required tabindex="46" /></td>
    </tr>
    <tr>
      <td>Pediatrics:</td>
      <td><input name="47." type="text" class="cardinal-number" required tabindex="47" /></td>
    </tr>
    <tr>
      <td>Psychiatric:</td>
      <td><input name="48." type="text" class="cardinal-number" required tabindex="48" /></td>
    </tr>
    <tr>
      <td>Decon:</td>
      <td>
        <select name="49." required tabindex="49">
          <option value="" selected disabled hidden style="display:none;"></option>
          <option value="Exceeded" data-background-color="black">Exceeded</option>
          <option value="Full" data-background-color="red">Full</option>
          <option value="Inactive" data-background-color="yellow">Inactive</option>
          <option value="Open" data-background-color="green">Open</option>
        </select>
      </td>
    </tr>
    <tr>
      <td>Vents:</td>
      <td><input name="50." type="text" class="cardinal-number" required tabindex="50" /></td>
    </tr>
    <tr class="block-caption">
      <td colspan="2">Comment:</td>
    </tr>
    <tr>
      <td colspan="2"><textarea name="51." rows="5" tabindex="51"></textarea></td>
    </tr>
  </table>
  <br />
  <scco-footer></scco-footer>
</the-form>
